<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document Worker</title>
</head>
<body>
<script>
function log(message) {
  webkit.messageHandlers.logHandler.postMessage(message);
}

let promiseId = 0;
let waitingPromises = {};
let nativeONNXPromiseId = 0;
let waitingNativeONNXPromises = {};
let worker = new Worker('worker.js');

async function query(action, data, transfer) {
  return new Promise(function (resolve, reject) {
    promiseId++;
    waitingPromises[promiseId] = { resolve, reject };
    worker.postMessage({ id: promiseId, action, data }, transfer);
  });
}

worker.onmessage = async function (e) {
  let message = e.data;

  if (message.responseID) {
    let waiting = waitingPromises[message.responseID];
    if (waiting) {
      delete waitingPromises[message.responseID];
      if (message.error) {
        waiting.reject(message.error);
      }
      else {
        waiting.resolve(message.data);
      }
    }
    return;
  }

  if (message.id) {
    try {
      let responseData = null;
      if (message.action === 'FetchData') {
        let buffer = await fetchLocalFile(message.data);
        responseData = new Uint8Array(buffer);
        worker.postMessage({ responseID: message.id, data: responseData }, [responseData.buffer]);
        return;
      }
      if (message.action === 'NativeONNXRun') {
        responseData = await nativeONNXRun(message.data);
        worker.postMessage({ responseID: message.id, data: responseData });
        return;
      }
      worker.postMessage({ responseID: message.id, data: responseData });
    }
    catch (error) {
      log(`worker query error: ${error}`);
      worker.postMessage({ responseID: message.id, error: { name: String(error) } });
    }
  }
};

async function fetchLocalFile(filePath) {
  log(`fetching ${filePath}`);
  let response = await fetch(filePath);
  let arrayBuffer = await response.arrayBuffer();
  return arrayBuffer.slice();
}

async function nativeONNXRun(data) {
  return new Promise(function (resolve, reject) {
    nativeONNXPromiseId++;
    let id = String(nativeONNXPromiseId);
    waitingNativeONNXPromises[id] = { resolve, reject };
    webkit.messageHandlers.nativeONNXHandler.postMessage({
      id,
      action: 'run',
      model: data.model,
      inputs: data.inputs,
      outputNames: data.outputNames
    });
  });
}

window.__zoteroNativeONNXBridgeReceiveResponse = function (id, response) {
  let waiting = waitingNativeONNXPromises[id];
  if (!waiting) {
    return;
  }
  delete waitingNativeONNXPromises[id];
  if (response.error) {
    waiting.reject(new Error(response.error));
  }
  else {
    waiting.resolve(response.result);
  }
};

function arrayBufferToBase64(buffer) {
  let bytes = new Uint8Array(buffer);
  let chunkSize = 0x8000;
  let binary = '';
  for (let offset = 0; offset < bytes.length; offset += chunkSize) {
    let chunk = bytes.subarray(offset, offset + chunkSize);
    binary += String.fromCharCode.apply(null, chunk);
  }
  return btoa(binary);
}

window.pdf = {};

async function performAction(action, workId, filePath, parameters) {
  try {
    let buf = await fetchLocalFile(filePath);
    let data = { buf };
    Object.assign(data, parameters || {});
    let result = await query(action, data, [buf]);

    if (action === 'pdf.getRecognizerData') {
      webkit.messageHandlers.recognizerDataHandler.postMessage({ workId, recognizerData: result });
      return;
    }
    if (action === 'pdf.getFulltext') {
      webkit.messageHandlers.fullTextHandler.postMessage({ workId, fullText: result });
      return;
    }
    if (action === 'getStructuredDocumentText') {
      webkit.messageHandlers.structuredDocumentTextHandler.postMessage({
        workId,
        structuredDocumentText: { buf: arrayBufferToBase64(result.buf) }
      });
      return;
    }
    throw new Error(`unsupported action: ${action}`);
  }
  catch (error) {
    log(`${action} error: ${error}`);
    throw error;
  }
}

pdf.getRecognizerData = async function (workId, filePath, password) {
  try {
    await performAction('pdf.getRecognizerData', workId, filePath, { password });
  }
  catch (error) {
    log(`recognize error: ${error}`);
    throw error;
  }
};

pdf.getFulltext = async function (workId, filePath, pageIndexes, password) {
  try {
    await performAction('pdf.getFulltext', workId, filePath, { pageIndexes, password });
  }
  catch (error) {
    log(`getFullText error: ${error}`);
    throw error;
  }
};

async function getStructuredDocumentText(workId, filePath, contentType, password, sourceHash) {
  try {
    await performAction('getStructuredDocumentText', workId, filePath, { contentType, password, sourceHash });
  }
  catch (error) {
    log(`getStructuredDocumentText error: ${error}`);
    throw error;
  }
}
</script>
</body>
</html>
